#
# Stage 1 observer observability stack for the Pi bench:
# Prometheus scrapes ws-bridge and Grafana serves the historical UC19 view.

services:
  observer-prometheus:
    image: prom/prometheus:v3.4.1
    network_mode: host
    mem_limit: 192m
    cpus: 0.35
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.listen-address=127.0.0.1:9090
      - --web.enable-lifecycle
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  observer-grafana:
    image: grafana/grafana:12.0.2
    network_mode: host
    mem_limit: 256m
    cpus: 0.35
    user: "0:0"
    environment:
      GF_SERVER_HTTP_ADDR: 127.0.0.1
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://127.0.0.1/grafana/}
      GF_SERVER_DOMAIN: ${GRAFANA_DOMAIN:-127.0.0.1}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards-json:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
