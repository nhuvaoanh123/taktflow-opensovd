$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://eclipse-opensovd.dev/schemas/semantic/fault-semantics.schema.yaml"
title: "OpenSOVD fault semantic binding schema"
description: >
  Contract for semantic binding files that normalize fault-code meaning,
  severity source, and status-field interpretation across SOVD-producing
  backends.
type: object
additionalProperties: false
required:
  - schema_version
  - domain
  - fault_bindings
properties:
  schema_version:
    type: integer
    minimum: 1
    description: Monotonic version for the local fault semantic contract.
  domain:
    type: string
    minLength: 1
    description: Semantic domain name for the binding set.
  fault_bindings:
    type: array
    minItems: 1
    description: Declared fault semantic bindings.
    items:
      type: object
      additionalProperties: false
      required:
        - fault_code
        - semantic_label
        - severity_source
        - status_field
      properties:
        fault_code:
          type: string
          minLength: 1
          description: Native fault code or DTC identifier.
        semantic_label:
          type: string
          minLength: 1
          description: Stable semantic label used across producers.
        severity_source:
          type: string
          enum:
            - native
            - derived
            - override
          description: Origin of the semantic severity classification.
        status_field:
          type: string
          minLength: 1
          description: Status field that drives the semantic state.
        notes:
          type: string
          description: Optional translator note preserved with the binding.
