[package]
name = "mbedtls-sys"
version = "0.1.0"
edition = "2024"
description = "Raw FFI bindings to mbedtls 4.0.0, generated by bindgen"
license = "Apache-2.0"
publish = false

[lib]
path = "src/lib.rs"
doctest = false

[lints]

[dependencies]

[build-dependencies]
bindgen = "0.72"
cc = "1"
cmake = "0.1"
diffy = "0.4"
sha256 = "1.6.0"
ureq = "3.2.0"
tar = "0.4"
bzip2 = "0.6.1"

# compile time format
const_format = { workspace = true }
