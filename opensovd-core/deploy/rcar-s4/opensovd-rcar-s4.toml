#
# First P12 Linux target template for the Renesas R-Car S4 host.
# Copy to /opt/taktflow/rcar-s4/config/opensovd.toml on the target.

[server]
address = "127.0.0.1"
port = 21002

[server.tls]
mode = "http"

[backend]
sqlite_path = "/opt/taktflow/rcar-s4/data/dfm.db"

[extended_vehicle_mqtt]
broker_host = "127.0.0.1"
broker_port = 1883
control_subscriber_enabled = true

[logging.otel]
enabled = false
