[package]
name = "fault-sink-mqtt"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "MQTT FaultSink backend. Publishes fault records as JSON to a configurable MQTT broker per ADR-0024."

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
sovd-interfaces = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "macros", "time"] }
tracing = { workspace = true }
chrono = { workspace = true }
rumqttc = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
insta = { workspace = true }
