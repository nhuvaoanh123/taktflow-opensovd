[package]
name = "sovd-dfm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Diagnostic Fault Manager (DFM) for the Eclipse OpenSOVD core stack"

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[features]
default = []
# Enables the S-CORE backend pluggability surface (ADR-0016). Flipping
# this feature on at compile time makes the sovd-db-score,
# fault-sink-lola, and opcycle-score-lifecycle crates available for
# runtime selection via the TOML config. With the feature off, only
# the standalone backends (sovd-db-sqlite, fault-sink-unix,
# opcycle-taktflow) are linked in.
score = [
    "sovd-db-score",
    "fault-sink-lola",
    "opcycle-score-lifecycle",
]

[dependencies]
sovd-interfaces = { workspace = true }
sovd-db-sqlite = { workspace = true }
fault-sink-unix = { workspace = true }
opcycle-taktflow = { workspace = true }
sovd-db-score = { workspace = true, optional = true }
fault-sink-lola = { workspace = true, optional = true }
opcycle-score-lifecycle = { workspace = true, optional = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt"] }
toml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
