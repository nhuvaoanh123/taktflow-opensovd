global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ws_bridge
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8082

  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9090
