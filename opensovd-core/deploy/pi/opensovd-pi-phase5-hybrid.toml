#
# Phase 5 Line A hybrid bench template for sovd-main on the Raspberry Pi.
# 3-ECU bench per ADR-0023:
#   - keep BCM local on the Pi (POSIX virtual body controller)
#   - forward CVC and SC to CDA under /vehicle/v15
#
# The CDA base_url values below are the public-safe TEST-NET-2 placeholder.
# For a live deploy, run deploy/pi/phase5-full-stack.sh with:
#   SOVD_CONFIG_FILE=deploy/pi/opensovd-pi-phase5-hybrid.toml
#   PHASE5_CDA_BASE_URL=http://<dev-host-lan-ip>:20002
# so the script can render the real bench URL without checking it into git.

dfm_component_id = ""
local_demo_components = ["bcm"]

[server]
address = "127.0.0.1"
port = 21002

[server.tls]
mode = "http"

[backend]
sqlite_path = "/opt/taktflow/sovd-main/dfm.db"

[bench_fault_injection]
enabled = true

[[cda_forward]]
component_id = "cvc"
remote_component_id = "cvc00000"
base_url = "http://198.51.100.10:20002"
path_prefix = "vehicle/v15"

[[cda_forward]]
component_id = "sc"
remote_component_id = "sc00000"
base_url = "http://198.51.100.10:20002"
path_prefix = "vehicle/v15"

[logging.otel]
enabled = false

# ---------------------------------------------------------------------------
# ADR-0024 Stage 1 — MQTT fault-sink fan-out (disabled by default).
#
# When this section is uncommented AND sovd-main is built with the
# `fault-sink-mqtt` Cargo feature, every DFM-ingested fault is ALSO
# published as JSON to `vehicle/dtc/new` on the local Mosquitto broker
# so the Stage 1 observer dashboard (ws_bridge + SvelteKit) can pick
# it up.
#
# TLS/mTLS is intentionally off for Stage 1 — the broker is
# loopback-only on the Pi and TLS termination is handled by the nginx
# fronting layer in ADR-0024 §"Resolved Decisions" OQ-24.3/OQ-24.4.
#
# TODO(T24.1.12 / T24.1.13): Mosquitto broker deployment on the Pi
# (eclipse-mosquitto:2 container) ships in a later task group along
# with the cloud_connector + ws_bridge + nginx compose stack. Do NOT
# uncomment until the broker is actually running locally, otherwise
# the buffered drain will log a WARN flood on every boot.
#
# [mqtt]
# broker_host = "127.0.0.1"
# broker_port = 1883
# topic       = "vehicle/dtc/new"
# bench_id    = "sovd-hil"
