[package]
name = "mbedtls-rs"
version = "0.1.0"
edition = "2024"
description = "Safe Rust wrapper for mbedtls 4.0.0 with async (Tokio) support"
license = "Apache-2.0"

[lib]
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[features]
default = ["tokio"]
tokio = ["dep:tokio"]

[dependencies]
ed25519-dalek = "2"
mbedtls-sys = { workspace = true }
tokio = { version = "1", features = [
  "io-util",
  "net",
  "rt",
  "macros",
], optional = true }
tracing = { version = "0.1.41" }

[dev-dependencies]
hex = "0.4"
