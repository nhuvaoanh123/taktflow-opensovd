#
# Phase 5 Line A local CDA config for the real Taktflow bench path.
#
# This uses generated bench MDD aliases with distinct DoIP logical
# addresses (3-ECU bench per ADR-0023):
#   CVC00000 -> 0x0001  (central)
#   SC00000  -> 0x0004  (safety)
#
# Run from opensovd-core with:
#   CDA_CONFIG=deploy/sil/opensovd-cda-phase5.toml ./deploy/sil/run-cda-local.sh

[database]
path = "deploy/pi/cda-mdd"

[doip]
tester_address = "192.0.2.20"
tester_subnet = "255.255.255.0"
# Bench fallback when the Pi proxy does not answer VIR/VAM discovery on :13401.
# Real IP must never be committed — set via local override only (see
# ../../CLAUDE.md §"Never commit private data"). Replace the placeholder
# below with the bench Pi IP before running on the bench.
static_gateway_ip = "PI_BENCH_IP_HERE"
# Bench proxy currently drops/mangles DoIP alive-check keepalives after routing activation.
enable_alive_check = false

[com_params.doip.logical_tester_address]
name = "CP_DoIPLogicalTesterAddress"
default = 65024

[logging.otel]
enabled = false
