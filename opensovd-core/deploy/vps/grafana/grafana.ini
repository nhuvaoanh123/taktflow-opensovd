[server]
http_addr = 0.0.0.0
http_port = 3000
domain = sovd.taktflow-systems.com
root_url = https://sovd.taktflow-systems.com/sovd/grafana/
serve_from_sub_path = true

[security]
allow_embedding = true
cookie_secure = true

[auth]
disable_login_form = true
disable_signout_menu = true

[auth.anonymous]
enabled = true
org_role = Viewer

[users]
allow_sign_up = false
default_theme = dark

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/taktflow-sovd-stage1.json
