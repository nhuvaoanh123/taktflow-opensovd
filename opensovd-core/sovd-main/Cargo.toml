[package]
name = "sovd-main"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Binary entry point for the Eclipse OpenSOVD core stack"

[lints]
workspace = true

[[bin]]
name = "sovd-main"
path = "src/main.rs"

[features]
default = []
score = [
    "sovd-dfm/score",
    "sovd-db-score",
    "opcycle-score-lifecycle",
]
fault-sink-mqtt = ["dep:fault-sink-mqtt"]
dlt-tracing = ["dep:tracing-dlt"]
insecure-http-fallback = []

[dependencies]
sovd-server = { workspace = true }
sovd-dfm = { workspace = true }
sovd-interfaces = { workspace = true }
sovd-db-sqlite = { workspace = true }
opcycle-taktflow = { workspace = true }
sovd-db-score = { workspace = true, optional = true }
opcycle-score-lifecycle = { workspace = true, optional = true }
fault-sink-mqtt = { workspace = true, optional = true }
axum = { workspace = true, features = ["http1", "tokio"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "net"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-opentelemetry = { workspace = true }
clap = { workspace = true }
figment = { workspace = true }
serde = { workspace = true }
url = { workspace = true }
tower-http = { workspace = true, features = ["trace"] }
opentelemetry = { workspace = true, features = ["trace"] }
opentelemetry_sdk = { workspace = true, features = ["trace"] }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic"] }
tracing-dlt = { path = "../../dlt-tracing-lib/tracing-dlt", optional = true }
axum-server = { version = "0.8.0", features = ["tls-rustls"] }
rustls = { version = "0.23.38", default-features = false, features = ["aws-lc-rs"] }

[dev-dependencies]
console-subscriber = { workspace = true }
rcgen = "0.14.7"
tempfile = { workspace = true }
