#
# Phase 7 SIL scenario - Extended Vehicle fault-log event flow.
#
# This scenario is executable in local SIL. It pins the Extended Vehicle
# fault-log list + drill-in slice and verifies that creating a
# `fault-log` subscription causes the ADR-0027 MQTT topic to emit the
# expected fault event before the subscription is deleted again.

name: sil_extended_vehicle_fault_log
scenario_class: event_flow

topology:
  description: >-
    Local SIL flow. Tester talks to the in-memory `sovd-server`
    surface; the `sovd-extended-vehicle` adapter serves the
    ISO-20078-shaped fault-log view over REST and mirrors fault-log
    subscription events on the ADR-0027 MQTT topic.

  test_client:
    host: 127.0.0.1
    process: integration-tests (cargo test, local SIL)
  sovd_server:
    host: 127.0.0.1
    route_builder: opensovd-core/sovd-server/src/routes/mod.rs
  extended_vehicle_adapter:
    crate: opensovd-core/sovd-extended-vehicle
    config: opensovd-core/sovd-extended-vehicle/config/extended-vehicle.toml
  mqtt_bus:
    host: 127.0.0.1
    topic: sovd/extended-vehicle/fault-log/new

contracts:
  rest_root: /sovd/v1/extended/vehicle
  fault_log_endpoint: /sovd/v1/extended/vehicle/fault-log
  fault_log_detail_template: /sovd/v1/extended/vehicle/fault-log/{log_id}
  subscription_endpoint: /sovd/v1/extended/vehicle/subscriptions
  publish_topic: sovd/extended-vehicle/fault-log/new

expected_primary_fault:
  log_id: flt-sc-u0100
  component_id: sc
  dtc: U0100
  lifecycle_state: confirmed
  source_fault_path: /sovd/v1/components/sc/faults/U0100

calls:
  - name: extended_vehicle_catalog
    method: GET
    path: /sovd/v1/extended/vehicle/
    expect_status: 200
    expect_contains_item: fault-log

  - name: read_fault_log
    method: GET
    path: /sovd/v1/extended/vehicle/fault-log
    expect_status: 200
    expect_type: extended_vehicle.fault_log_list

  - name: read_fault_log_detail
    method: GET
    path_template: /sovd/v1/extended/vehicle/fault-log/{log_id}
    depends_on: read_fault_log
    expect_status: 200
    expect_type: extended_vehicle.fault_log_detail

  - name: create_fault_log_subscription
    method: POST
    path: /sovd/v1/extended/vehicle/subscriptions
    body:
      data_item: fault-log
    expect_status: 201
    expect_type: extended_vehicle.subscription

  - name: subscribe_fault_log_new
    protocol: MQTT
    action: SUBSCRIBE
    topic: sovd/extended-vehicle/fault-log/new
    expect_min_messages: 1
    expect_payload_fields:
      fault_log_id: flt-sc-u0100
      component_id: sc
      dtc: U0100
      lifecycle_state: confirmed

  - name: delete_fault_log_subscription
    method: DELETE
    path_template: /sovd/v1/extended/vehicle/subscriptions/{subscription_id}
    depends_on: create_fault_log_subscription
    expect_status: 204

evidence:
  - the Extended Vehicle catalog advertises the fault-log item
  - the REST fault-log list returns the ADR-0027-shaped list contract and the drill-in path resolves the pinned SC fault
  - creating then deleting a `fault-log` subscription round-trips through the Extended Vehicle subscription registry
  - the MQTT fault-log topic emits the expected pinned fault event for the subscription lifecycle
