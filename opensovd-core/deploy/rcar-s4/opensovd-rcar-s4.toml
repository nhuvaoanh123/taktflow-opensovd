#
# First P12 Linux target template for the Renesas R-Car S4 host.
# Copy to /opt/taktflow/rcar-s4/config/opensovd.toml on the target.

[server]
address = "127.0.0.1"
port = 21002

[server.tls]
mode = "http"

[backend]
sqlite_path = "/opt/taktflow/rcar-s4/data/dfm.db"

[extended_vehicle_mqtt]
broker_host = "127.0.0.1"
broker_port = 1883
control_subscriber_enabled = true

[logging.otel]
enabled = false

# PROD-20.3 UDS-to-SOVD ingress sidecar boundary.
# Disabled until the target MDD set is installed for the specific vehicle.
[uds2sovd_proxy]
enabled = false
binary_path = "/opt/taktflow/rcar-s4/bin/uds2sovd-proxy"
generated_config_path = "/opt/taktflow/rcar-s4/config/uds2sovd-proxy.toml"
bind_address = "127.0.0.1"
bind_port = 13400
sovd_base_url = "http://127.0.0.1:21002/"

[[uds2sovd_proxy.target]]
component_id = "cvc"
mdd_path = "/opt/taktflow/rcar-s4/mdd/CVC00000.mdd"
logical_address = 1

[uds2sovd_proxy.target.did_routes]
"0xF190" = "vin"
