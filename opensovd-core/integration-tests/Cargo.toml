[package]
name = "integration-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Integration tests harness for the Eclipse OpenSOVD core stack"

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[features]
# ADR-0024 T24.2.x: opt-in MQTT fan-out integration test flag.
# The rumqttd / rumqttc / fault-sink-mqtt dev-deps are always linked
# (Cargo does not support truly optional dev-dependencies), but the
# test file `adr0024_fault_mqtt_fanout.rs` itself is gated by this
# feature so the in-process broker only starts when requested.
fault-sink-mqtt = []

[dependencies]

[dev-dependencies]
sovd-server = { workspace = true }
sovd-interfaces = { workspace = true }
sovd-extended-vehicle = { workspace = true }
sovd-dfm = { workspace = true }
sovd-db-sqlite = { workspace = true }
opcycle-taktflow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true, features = ["http1", "tokio"] }
serde = { workspace = true, features = ["derive"] }
serde_yaml = "0.9"
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "time", "sync"] }
reqwest = { workspace = true, features = ["json"] }
serde_json = { workspace = true }
tempfile = { workspace = true }
url = { workspace = true }
utoipa = { workspace = true, features = ["yaml"] }
# ADR-0024 T24.2.x — MQTT fan-out test dependencies.
fault-sink-mqtt = { workspace = true }
rumqttd = { version = "0.20", default-features = false }
rumqttc = { workspace = true }
