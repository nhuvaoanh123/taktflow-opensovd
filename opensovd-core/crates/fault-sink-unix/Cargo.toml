[package]
name = "fault-sink-unix"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Unix-socket FaultSink backend. Default standalone Fault Library IPC path per ADR-0002 and ADR-0016."

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
sovd-interfaces = { workspace = true }
async-trait = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "net", "io-util", "macros", "sync"] }
tracing = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time"] }
