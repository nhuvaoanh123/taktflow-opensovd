#
# Phase 5 Line A D1 — sovd-main configuration for the Raspberry Pi bench.
# Installed by deploy/pi/phase5-full-stack.sh to
# /opt/taktflow/sovd-main/opensovd.toml.

[server]
address = "127.0.0.1"
port = 21002

[server.tls]
mode = "http"

[backend]
sqlite_path = "/opt/taktflow/sovd-main/dfm.db"

[extended_vehicle_mqtt]
broker_host = "127.0.0.1"
broker_port = 1883
control_subscriber_enabled = true

[logging.otel]
enabled = false
