# Phase 5 Line A D2 - HIL scenario 01: read faults across all bench ECUs.
#
# Per docs/prompts/phase-5-line-a.md, this scenario must exist now but it
# must remain gated on PHASE5_BENCH_READY=1 until Line B declares the full
# hardware fleet ready. The D2 integration test loads this file directly.

name: hil_sovd_01_read_faults_all

gate:
  bench_env: TAKTFLOW_BENCH
  bench_env_value: "1"
  readiness_env: PHASE5_BENCH_READY
  readiness_env_value: "1"
  tcp_addr: 192.168.0.197:21002
  base_url: http://192.168.0.197:21002
  not_ready_reason: >-
    Line B Phase 5 has not yet declared the full bench fleet ready.
    Keep D2 gated until CVC, FZC, RZC, and TCU are all provisioned and
    reachable through Pi sovd-main.

fleet:
  expected_components:
    - cvc
    - fzc
    - rzc
    - tcu

inventory_call:
  name: list_components
  method: GET
  path: /sovd/v1/components
  expect_status: 200
  expect_type: sovd_interfaces::spec::component::DiscoveredEntities

calls:
  - name: cvc_faults
    method: GET
    component_id: cvc
    path: /sovd/v1/components/cvc/faults
    expect_status: 200
    expect_type: sovd_interfaces::spec::fault::ListOfFaults

  - name: fzc_faults
    method: GET
    component_id: fzc
    path: /sovd/v1/components/fzc/faults
    expect_status: 200
    expect_type: sovd_interfaces::spec::fault::ListOfFaults

  - name: rzc_faults
    method: GET
    component_id: rzc
    path: /sovd/v1/components/rzc/faults
    expect_status: 200
    expect_type: sovd_interfaces::spec::fault::ListOfFaults

  - name: tcu_faults
    method: GET
    component_id: tcu
    path: /sovd/v1/components/tcu/faults
    expect_status: 200
    expect_type: sovd_interfaces::spec::fault::ListOfFaults
