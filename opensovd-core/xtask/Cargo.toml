[package]
name = "xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Workspace-scoped developer task runner for Eclipse OpenSOVD core"

[lints]
workspace = true

[[bin]]
name = "xtask"
path = "src/main.rs"

[dependencies]
sovd-server = { workspace = true }
clap = { workspace = true }
utoipa = { workspace = true, features = ["yaml"] }
