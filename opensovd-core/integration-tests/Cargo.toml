[package]
name = "integration-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "Integration tests harness for the Eclipse OpenSOVD core stack"

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]

[dev-dependencies]
sovd-server = { workspace = true }
sovd-interfaces = { workspace = true }
sovd-dfm = { workspace = true }
sovd-db-sqlite = { workspace = true }
opcycle-taktflow = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true, features = ["http1", "tokio"] }
serde = { workspace = true, features = ["derive"] }
serde_yaml = "0.9"
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "net", "time", "sync"] }
reqwest = { workspace = true, features = ["json"] }
serde_json = { workspace = true }
tempfile = { workspace = true }
url = { workspace = true }
utoipa = { workspace = true, features = ["yaml"] }
