[package]
name = "sovd-db-score"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
homepage.workspace = true
publish = false
description = "S-CORE (score-persistency) stub backend for the SovdDb trait. Feature-gated per ADR-0016."

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[features]
# `score` gates any real S-CORE wiring. Today the crate compiles either
# way — turning the feature on is what "would" pull in `score-persistency`
# once the upstream crate is on the dev machine.
default = []
score = []

[dependencies]
sovd-interfaces = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
